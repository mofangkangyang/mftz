<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 30px 20px;
            text-align: center;
            border-bottom: 3px solid #667eea;
        }

        .header h1 {
            font-size: 24px;
            color: #333;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .header p {
            font-size: 14px;
            color: #666;
            line-height: 1.8;
        }

        .header .badge {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            margin-bottom: 15px;
        }

        .progress {
            background: #e0e0e0;
            height: 8px;
            border-radius: 4px;
            margin: 20px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s ease;
            border-radius: 4px;
        }

        .progress-text {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .question-section {
            padding: 20px;
            display: none;
        }

        .question-section.active {
            display: block;
        }

        .section-title {
            font-size: 18px;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
            display: flex;
            align-items: center;
        }

        .section-title .icon {
            width: 30px;
            height: 30px;
            background: #667eea;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 10px;
            font-size: 14px;
        }

        .question-item {
            margin-bottom: 25px;
            padding: 15px;
            background: #f9fafb;
            border-radius: 12px;
            border-left: 4px solid #667eea;
        }

        .question-item h4 {
            font-size: 16px;
            color: #333;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option-label {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .option-label:hover {
            border-color: #667eea;
            background: #f0f3ff;
        }

        .option-label input[type="radio"] {
            margin-right: 10px;
            width: 18px;
            height: 18px;
            accent-color: #667eea;
        }

        .option-label input[type="radio"]:checked + .option-text {
            color: #667eea;
            font-weight: 600;
        }

        .option-label.selected {
            border-color: #667eea;
            background: #e8ecff;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            padding: 20px;
            border-top: 1px solid #e0e0e0;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-prev {
            background: #f0f0f0;
            color: #333;
        }

        .btn-prev:hover {
            background: #e0e0e0;
        }

        .btn-next {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-next:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-next:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .result-section {
            display: none;
            padding: 30px;
        }

        .result-section.active {
            display: block;
        }

        .result-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            text-align: center;
        }

        .result-type {
            font-size: 32px;
            color: #667eea;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .result-score {
            font-size: 16px;
            color: #666;
            margin-bottom: 15px;
        }

        .result-description {
            font-size: 15px;
            color: #333;
            line-height: 1.8;
            text-align: left;
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-top: 15px;
        }

        .advice-section {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
        }

        .advice-title {
            font-size: 18px;
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e0e0e0;
        }

        .advice-item {
            margin-bottom: 20px;
        }

        .advice-item h5 {
            font-size: 16px;
            color: #667eea;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
        }

        .advice-item h5::before {
            content: "▸";
            margin-right: 8px;
        }

        .advice-item p {
            font-size: 14px;
            color: #555;
            line-height: 1.7;
            padding-left: 20px;
        }

        .multiple-constitution {
            background: #fff3cd;
            border: 2px solid #ffc107;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .multiple-constitution h4 {
            color: #856404;
            margin-bottom: 10px;
        }

        .multiple-constitution ul {
            list-style: none;
            padding: 0;
        }

        .multiple-constitution li {
            padding: 8px 0;
            color: #856404;
            border-bottom: 1px dashed #ffc107;
        }

        .warning {
            background: #f8d7da;
            border: 2px solid #f5c6cb;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            color: #721c24;
            font-size: 14px;
            line-height: 1.7;
        }

        .btn-retest {
            display: block;
            width: 100%;
            max-width: 300px;
            margin: 30px auto 0;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-retest:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        @media (max-width: 600px) {
            .container {
                border-radius: 0;
                box-shadow: none;
            }

            .header h1 {
                font-size: 20px;
            }

            .section-title {
                font-size: 16px;
            }

            .question-item h4 {
                font-size: 14px;
            }

            .result-type {
                font-size: 26px;
            }
        }
    </style>
</head>
<body>
    <div class="container">

        </div>

        <div class="nav-buttons" id="navButtons">
            <button class="btn btn-prev" id="prevBtn" onclick="prevSection()">上一页</button>
            <button class="btn btn-next" id="nextBtn" onclick="nextSection()">下一页</button>
        </div>

                { id: "i7", text: "您感到眼睛干涩吗?", reverse: false },
                { id: "i8", text: "您感到口干咽燥、总想喝水吗?", reverse: false }
            ],
            qixu: [
                { id: "q1", text: "您容易疲乏吗?", reverse: false },
                { id: "q2", text: "您容易气短（呼吸短促，接不上气）吗?", reverse: false },

            ],
            tanshi: [

                { id: "t2", text: "您感到身体、脸上不轻松或不爽快吗?", reverse: false },
                { id: "t3", text: "您腹部肥满松软吗?", reverse: false },
                { id: "t4", text: "您有额部油脂分泌多的现象吗?", reverse: false },
                { id: "t5", text: "您上眼睑比别人肿（仍轻微隆起的现象）吗?", reverse: false },
                { id: "t6", text: "您嘴里有黏黏的感觉吗?", reverse: false },
                { id: "t7", text: "您平时痰多，特别是咽喉部总感到有痰堵着吗?", reverse: false },
                { id: "t8", text: "您舌苔厚腻或有舌苔厚厚的感觉吗?", reverse: false }
            ],
            shire: [

                { id: "s2", text: "您容易生痤疮或疮疖吗?", reverse: false },
                { id: "s3", text: "您感到口苦或嘴里有异味吗?", reverse: false },
                { id: "s4", text: "您大便黏滞不爽、有解不尽的感觉吗?", reverse: false },

                { id: "s6", text: "您带下色黄（白带颜色发黄、女性）/ 您的阴囊部位潮湿吗（男性）?", reverse: false }
            ],
            xueyu: [
                { id: "b1", text: "您的皮肤在不知不觉中会出现青紫瘀斑（皮下出血）吗?", reverse: false },
                { id: "b2", text: "您的两颧部有细微红血丝吗?", reverse: false },
                { id: "b3", text: "您的身体某处有固定的疼痛吗?", reverse: false },
                { id: "b4", text: "您的面色晦暗或容易出现褐斑吗?", reverse: false },
                { id: "b5", text: "您容易有黑眼圈吗?", reverse: false },
                { id: "b6", text: "您容易忘事（健忘）吗?", reverse: false },
                { id: "b7", text: "您的口唇颜色偏暗吗?", reverse: false }
            ],
            qiyu: [
                { id: "g1", text: "您感到闷闷不乐、情绪低沉吗?", reverse: false },
                { id: "g2", text: "您容易精神紧张、焦虑不安吗?", reverse: false },
                { id: "g3", text: "您多愁善感、感情脆弱吗?", reverse: false },
                { id: "g4", text: "您容易感到害怕或受到惊吓吗?", reverse: false },
                { id: "g5", text: "您的胁肋部或乳房胀痛吗?", reverse: false },
                { id: "g6", text: "您无缘无故叹气吗?", reverse: false },
                { id: "g7", text: "您的咽喉部有异物感，且吐之不出、咽之不下吗?", reverse: false }
            ],
            tebing: [
                { id: "sp1", text: "您没有感冒时也会打喷嚏吗?", reverse: false },
                { id: "sp2", text: "您没有感冒时也会鼻塞、流鼻涕吗?", reverse: false },
                { id: "sp3", text: "您有因季节变化、温度变化或异味等原因而咳喘的现象吗?", reverse: false },
                { id: "sp4", text: "您容易过敏（对药物、食物、气味、花粉或在季节交替、气候变化时）吗?", reverse: false },
                { id: "sp5", text: "您的皮肤容易起荨麻疹（风团、风疹块、风疙瘩）吗?", reverse: false },
                { id: "sp6", text: "您的皮肤因过敏出现过紫癜（紫红色瘀点、瘀斑）吗?", reverse: false },
                { id: "sp7", text: "您的皮肤一抓就红，并出现抓痕吗?", reverse: false }
            ]
        };

        // 问卷sections顺序
        const sections = [
            { key: "peaceful", title: "平和质判定", icon: "平和" },
            { key: "yangxu", title: "阳虚质判定", icon: "阳虚" },
            { key: "yinxu", title: "阴虚质判定", icon: "阴虚" },
            { key: "qixu", title: "气虚质判定", icon: "气虚" },
            { key: "tanshi", title: "痰湿质判定", icon: "痰湿" },
            { key: "shire", title: "湿热质判定", icon: "湿热" },
            { key: "xueyu", title: "血瘀质判定", icon: "血瘀" },
            { key: "qiyu", title: "气郁质判定", icon: "气郁" },
            { key: "tebing", title: "特禀质判定", icon: "特禀" }
        ];

        let currentSection = 0;
        let answers = {};
        let sectionCompleted = [];

        // 初始化
        function init() {
            renderQuestions();
            updateProgress();
            updateNavButtons();
        }

        // 渲染问题
        function renderQuestions() {
            const container = document.getElementById('questionContainer');
            container.innerHTML = '';

            sections.forEach((section, index) => {
                const sectionDiv = document.createElement('div');
                sectionDiv.className = `question-section ${index === currentSection ? 'active' : ''}`;
                sectionDiv.id = `section-${index}`;

                const questionsData = questions[section.key];
                const sectionInfo = constitutionData[section.key];

                let questionsHTML = '';
                questionsData.forEach((q, qIndex) => {
                    questionsHTML += `
                        <div class="question-item">
                            <h4>${qIndex + 1}. ${q.text}</h4>
                            <div class="options">
                                <label class="option-label" onclick="selectOption('${section.key}', '${q.id}', 1, this)">
                                    <input type="radio" name="${q.id}" value="1">
                                    <span class="option-text">没有（根本不）- 1分</span>
                                </label>
                                <label class="option-label" onclick="selectOption('${section.key}', '${q.id}', 2, this)">
                                    <input type="radio" name="${q.id}" value="2">
                                    <span class="option-text">很少（有一点）- 2分</span>
                                </label>
                                <label class="option-label" onclick="selectOption('${section.key}', '${q.id}', 3, this)">
                                    <input type="radio" name="${q.id}" value="3">
                                    <span class="option-text">有时（有些）- 3分</span>
                                </label>
                                <label class="option-label" onclick="selectOption('${section.key}', '${q.id}', 4, this)">
                                    <input type="radio" name="${q.id}" value="4">
                                    <span class="option-text">经常（相当）- 4分</span>
                                </label>
                                <label class="option-label" onclick="selectOption('${section.key}', '${q.id}', 5, this)">
                                    <input type="radio" name="${q.id}" value="5">
                                    <span class="option-text">总是（非常）- 5分</span>
                                </label>
                            </div>
                        </div>
                    `;
                });

                sectionDiv.innerHTML = `
                    <div class="section-title">
                        <span class="icon">${index + 1}</span>
                        ${section.title}（${sectionInfo.name}）
                    </div>
                    ${questionsHTML}
                `;

                container.appendChild(sectionDiv);
            });
        }

        // 选择选项
        function selectOption(sectionKey, questionId, value, element) {
            if (!answers[sectionKey]) {
                answers[sectionKey] = {};
            }
            answers[sectionKey][questionId] = value;

            // 移除同一题其他选项的选中状态
            const allOptions = document.querySelectorAll(`input[name="${questionId}"]`);
            allOptions.forEach(opt => {
                opt.closest('.option-label').classList.remove('selected');
            });

            // 添加当前选项的选中状态
            element.querySelector('input').checked = true;
            element.classList.add('selected');

            checkSectionCompletion();
        }

        // 检查当前section是否完成
        function checkSectionCompletion() {
            const currentQuestions = questions[sections[currentSection].key];
            let answeredCount = 0;

            if (answers[sections[currentSection].key]) {
                const sectionAnswers = answers[sections[currentSection].key];
                currentQuestions.forEach(q => {
                    if (sectionAnswers[q.id]) {
                        answeredCount++;
                    }
                });
            }

            sectionCompleted[currentSection] = answeredCount === currentQuestions.length;
            updateNavButtons();
        }

        // 更新进度条
        function updateProgress() {
            const total = sections.length;
            const progress = Math.round((currentSection / total) * 100);
            document.getElementById('progressBar').style.width = progress + '%';
            document.getElementById('progressText').textContent = progress;
        }

        // 更新导航按钮
        function updateNavButtons() {
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');

            prevBtn.disabled = currentSection === 0;

            if (currentSection === sections.length - 1) {
                nextBtn.textContent = '提交测试';
                nextBtn.disabled = !sectionCompleted[currentSection];
            } else {
                nextBtn.textContent = '下一页';
                nextBtn.disabled = !sectionCompleted[currentSection];
            }
        }

        // 下一页
        function nextSection() {
            if (currentSection < sections.length - 1) {
                currentSection++;
                switchSection();
            } else {
                calculateResult();
            }
        }

        // 上一页
        function prevSection() {
            if (currentSection > 0) {
                currentSection--;
                switchSection();
            }
        }

        // 切换section
        function switchSection() {
            const allSections = document.querySelectorAll('.question-section');
            allSections.forEach((section, index) => {
                if (index === currentSection) {
                    section.classList.add('active');
                } else {
                    section.classList.remove('active');
                }
            });

            // 滚动到页面顶部
            window.scrollTo({
                top: 0,
                behavior: 'smooth'
            });

            updateProgress();
            updateNavButtons();
        }

        // 计算标准分
        function calculateStandardScore(originalScore, questionCount) {
            return ((originalScore - questionCount) / (questionCount * 4)) * 100;
        }

        // 计算结果
        function calculateResult() {
            const results = {};
            const totalScores = {};

            // 计算每种体质的得分
            Object.keys(questions).forEach(key => {
                const questionsData = questions[key];
                const sectionAnswers = answers[key] || {};
                let originalScore = 0;
                let answeredCount = 0;

                questionsData.forEach(q => {
                    const answer = sectionAnswers[q.id];
                    if (answer) {
                        // 如果是逆向计分，需要反转分数
                        if (q.reverse) {
                            originalScore += (6 - answer);
                        } else {
                            originalScore += parseInt(answer);
                        }
                        answeredCount++;
                    }
                });

                if (answeredCount > 0) {
                    const standardScore = calculateStandardScore(originalScore, questionsData.length);
                    totalScores[key] = {
                        originalScore: originalScore,
                        standardScore: standardScore.toFixed(1),
                        questionCount: questionsData.length
                    };
                }
            });

            // 判断体质类型
            let peacefulScore = totalScores['peaceful'] ? parseFloat(totalScores['peaceful'].standardScore) : 0;
            let isPeaceful = false;

            // 检查是否为平和质
            if (peacefulScore >= 60) {
                let allLow = true;
                Object.keys(totalScores).forEach(key => {
                    if (key !== 'peaceful') {
                        if (parseFloat(totalScores[key].standardScore) >= 40) {
                            allLow = false;
                        }
                    }
                });

                if (allLow) {
                    isPeaceful = true;
                }
            }

            // 判断偏颇体质
            const biasedConstitutions = [];
            Object.keys(totalScores).forEach(key => {
                if (key !== 'peaceful') {
                    const score = parseFloat(totalScores[key].standardScore);
                    if (score >= 40) {
                        biasedConstitutions.push({
                            key: key,
                            score: score
                        });
                    }
                }
            });

            // 按分数排序
            biasedConstitutions.sort((a, b) => b.score - a.score);

            // 显示结果
            displayResult(isPeaceful, biasedConstitutions, totalScores);
        }

        // 显示结果
        function displayResult(isPeaceful, biasedConstitutions, totalScores) {
            document.getElementById('questionContainer').style.display = 'none';
            document.getElementById('navButtons').style.display = 'none';
            document.getElementById('resultSection').classList.add('active');

            const resultType = document.getElementById('resultType');
            const resultScore = document.getElementById('resultScore');
            const resultDescription = document.getElementById('resultDescription');
            const multipleConstitution = document.getElementById('multipleConstitution');
            const adviceContent = document.getElementById('adviceContent');

            if (isPeaceful) {
                // 平和质
                const peacefulData = constitutionData.peaceful;
                resultType.textContent = peacefulData.name;
                resultType.style.color = '#667eea';
                resultScore.textContent = `平和质得分: ${totalScores.peaceful.standardScore}分`;
                resultDescription.textContent = peacefulData.description;
                multipleConstitution.innerHTML = '';

                adviceContent.innerHTML = `
                    <div class="advice-item">
                        <h5>体质特征</h5>
                        <p>${peacefulData.characteristics}</p>
                    </div>
                    <div class="advice-item">
                        <h5>饮食建议</h5>
                        <p>${peacefulData.healthAdvice.diet}</p>
                    </div>
                    <div class="advice-item">
                        <h5>运动建议</h5>
                        <p>${peacefulData.healthAdvice.exercise}</p>
                    </div>
                    <div class="advice-item">
                        <h5>生活起居</h5>
                        <p>${peacefulData.healthAdvice.lifestyle}</p>
                    </div>
                    <div class="advice-item">
                        <h5>发病倾向</h5>
                        <p>${peacefulData.tendency}</p>
                    </div>
                `;
            } else if (biasedConstitutions.length > 0) {
                // 偏颇体质（取最高分）
                const mainConstitution = biasedConstitutions[0];
                const constitutionData_item = constitutionData[mainConstitution.key];

                resultType.textContent = constitutionData_item.name;
                resultType.style.color = '#e74c3c';
                resultScore.textContent = `${constitutionData_item.name}得分: ${mainConstitution.score}分`;
                resultDescription.textContent = constitutionData_item.description;

                // 复合体质
                if (biasedConstitutions.length > 1) {
                    let multipleHTML = '<div class="multiple-constitution"><h4>您可能为复合体质：</h4><ul>';
                    biasedConstitutions.slice(0, 3).forEach(item => {
                        const data = constitutionData[item.key];
                        multipleHTML += `<li>${data.name}（${item.score}分）</li>`;
                    });
                    multipleHTML += '</ul></div>';
                    multipleConstitution.innerHTML = multipleHTML;
                } else {
                    multipleConstitution.innerHTML = '';
                }

                adviceContent.innerHTML = `
                    <div class="advice-item">
                        <h5>体质特征</h5>
                        <p>${constitutionData_item.characteristics}</p>
                    </div>
                    <div class="advice-item">
                        <h5>饮食建议</h5>
                        <p>${constitutionData_item.healthAdvice.diet}</p>
                    </div>
                    <div class="advice-item">
                        <h5>运动建议</h5>
                        <p>${constitutionData_item.healthAdvice.exercise}</p>
                    </div>
                    <div class="advice-item">
                        <h5>生活起居</h5>
                        <p>${constitutionData_item.healthAdvice.lifestyle}</p>
                    </div>
                    <div class="advice-item">
                        <h5>发病倾向</h5>
                        <p>${constitutionData_item.tendency}</p>
                    </div>
                `;
            } else {
                // 倾向型体质
                let tendencyConstitutions = [];
                Object.keys(totalScores).forEach(key => {
                    if (key !== 'peaceful') {
                        const score = parseFloat(totalScores[key].standardScore);
                        if (score >= 30 && score < 40) {
                            tendencyConstitutions.push({
                                key: key,
                                score: score
                            });
                        }
                    }
                });

                tendencyConstitutions.sort((a, b) => b.score - a.score);

                if (tendencyConstitutions.length > 0) {
                    const mainTendency = tendencyConstitutions[0];
                    const constitutionData_item = constitutionData[mainTendency.key];

                    resultType.textContent = `${constitutionData_item.name}（倾向型）`;
                    resultType.style.color = '#f39c12';
                    resultScore.textContent = `${constitutionData_item.name}得分: ${mainTendency.score}分（30-39分为倾向型）`;
                    resultDescription.textContent = constitutionData_item.description;

                    let tendencyHTML = '<div class="multiple-constitution"><h4>您可能为以下体质倾向：</h4><ul>';
                    tendencyConstitutions.slice(0, 3).forEach(item => {
                        const data = constitutionData[item.key];
                        tendencyHTML += `<li>${data.name}（${item.score}分）- 倾向型</li>`;
                    });
                    tendencyHTML += '</ul></div>';
                    multipleConstitution.innerHTML = tendencyHTML;

                    adviceContent.innerHTML = `
                        <div class="advice-item">
                            <h5>体质特征</h5>
                            <p>${constitutionData_item.characteristics}</p>
                        </div>
                        <div class="advice-item">
                            <h5>饮食建议</h5>
                            <p>${constitutionData_item.healthAdvice.diet}</p>
                        </div>
                        <div class="advice-item">
                            <h5>运动建议</h5>
                            <p>${constitutionData_item.healthAdvice.exercise}</p>
                        </div>
                        <div class="advice-item">
                            <h5>生活起居</h5>
                            <p>${constitutionData_item.healthAdvice.lifestyle}</p>
                        </div>
                        <div class="advice-item">
                            <h5>发病倾向</h5>
                            <p>${constitutionData_item.tendency}</p>
                        </div>
                    `;
                } else {
                    // 无明显偏颇
                    resultType.textContent = "无明显偏颇体质";
                    resultType.style.color = '#27ae60';
                    resultScore.textContent = "您的各项体质得分均偏低，可能处于平和质与偏颇体质的过渡状态";
                    resultDescription.textContent = "建议继续保持健康的生活方式，定期监测体质变化。";
                    multipleConstitution.innerHTML = '';

                    adviceContent.innerHTML = `
                        <div class="advice-item">
                            <h5>保持健康生活方式</h5>
                            <p>保持均衡饮食，规律作息，适度运动，良好心态，是维持健康体质的关键。</p>
                        </div>
                    `;
                }
            }
        }

        // 重置测试
        function resetTest() {
            currentSection = 0;
            answers = {};
            sectionCompleted = [];

            document.getElementById('resultSection').classList.remove('active');
            document.getElementById('questionContainer').style.display = 'block';
            document.getElementById('navButtons').style.display = 'flex';

            renderQuestions();
            updateProgress();
            updateNavButtons();
        }

        // 页面加载完成后初始化
        window.onload = init;
    </script>
</body>
